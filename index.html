<style>
body {
    font-family: 'Roboto', sans-serif;
    margin: 0;
    background-color: orchid; /* background ungu lembut */
    color: darkorchid; /* teks ungu gelap */
}
nav {
    background-color: plum; /* ungu utama */
    padding: 1em;
    text-align: center;
    position: sticky;
    top: 0;
    z-index: 10;
}
nav a {
    color: orchid;
    text-decoration: none;
    margin: 0 1em;
    font-weight: bold;
    transition: 0.3s;
}
nav a:hover { color: darkorchid; }

header {
    text-align: center;
    padding: 2em 1em;
    background-color: mediumorchid;
}
header h1 {
    font-family: 'Merriweather', serif;
    color: plum;
    font-size: 2.5em;
}
header p { font-size: 1.2em; color: darkorchid }
.btn {
    background-color: purple;
    color: orchid;
    padding: 10px 20px;
    text-decoration: none;
    border-radius: 5px;
    font-weight: bold;
    transition: 0.3s;
}
.btn:hover { background-color: purple; }

/* Accordion */
.accordion {
    background-color: plum;
    color: #2e003e;
    cursor: pointer;
    padding: 1em;
    width: 90%;
    margin: 1em auto;
    border: none;
    border-radius: 8px;
    text-align: left;
    outline: none;
    font-weight: bold;
    transition: 0.3s;
}
.accordion:hover { background-color: plum; }
.accordion.active { background-color: darkorchid; }
.panel {
    padding: 1em;
    display: none;
    background-color: rebeccapurple;
    border-radius: 0 0 8px 8px;
}

/* Slider */
.slider-container {
    position: relative;
    width: 100%;
    overflow: hidden;
}
.slider-track {
    display: flex;
    gap: 1em;
    transition: transform 0.5s ease;
}
.slider-track img {
    width: 200px;
    height: 250px;
    object-fit: cover;
    border-radius: 8px;
    transition: transform 0.3s;
}
.slider-track img:hover { transform: scale(1.05); }

/* Arrow Buttons */
.arrow {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background-color: rebeccapurple; /* ungu semi transparan */
    border: none;
    color: mediumorchid;
    font-size: 2em;
    padding: 0 10px;
    cursor: pointer;
    border-radius: 50%;
    z-index: 5;
}
.arrow:hover { background-color: orchid; }
.arrow-left { left: 10px; }
.arrow-right { right: 10px; }

/* Footer */
footer {
    text-align: center;
    padding: 1em;
    background-color: plum;
    color: darkorchid;
    margin-top: 2em;
}
</style>
</head>

<script>
// Accordion
document.querySelectorAll('.accordion').forEach(acc => {
    acc.addEventListener('click', function() {
        this.classList.toggle('active');
        const panel = this.nextElementSibling;
        panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
    });
});

// Slider Auto + Manual
document.querySelectorAll('.slider-container').forEach(container => {
    const track = container.querySelector('.slider-track');
    const btnLeft = container.querySelector('.arrow-left');
    const btnRight = container.querySelector('.arrow-right');
    let scrollAmount = 0;
    const slideWidth = 220;
    const maxScroll = track.scrollWidth - container.offsetWidth;

    btnLeft.addEventListener('click', () => {
        scrollAmount -= slideWidth;
        if(scrollAmount < 0) scrollAmount = 0;
        track.style.transform = `translateX(-${scrollAmount}px)`;
    });
    btnRight.addEventListener('click', () => {
        scrollAmount += slideWidth;
        if(scrollAmount > maxScroll) scrollAmount = maxScroll;
        track.style.transform = `translateX(-${scrollAmount}px)`;
    });

    setInterval(() => {
        scrollAmount += slideWidth;
        if(scrollAmount > maxScroll) scrollAmount = 0;
        track.style.transform = `translateX(-${scrollAmount}px)`;
    }, 3000);
});
</script>
